




version: "3.9"

services:

  # ── PostgreSQL 15 ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: curio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       curio_db
      POSTGRES_USER:     curio_user
      POSTGRES_PASSWORD: localdevpass
    ports:
      - "5432:5432"     # expose for pgAdmin / DBeaver on host
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curio_user -d curio_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .              
      dockerfile: backend/Dockerfile
    container_name: curio_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── Database ─────────────────────────────────────────────────────────
      DATABASE_URL:                 postgresql://curio_user:localdevpass@db:5432/curio_db
      DB_POOL_SIZE:                 "5"
      DB_MAX_OVERFLOW:              "10"
      DB_POOL_TIMEOUT:              "30"
      DB_POOL_RECYCLE:              "1800"
      # ── Auth ─────────────────────────────────────────────────────────────
      SECRET_KEY:                   dev-secret-key-CHANGE-in-production-min-32-chars
      ALGORITHM:                    HS256
      ACCESS_TOKEN_EXPIRE_MINUTES:  "1440"
      # ── App ──────────────────────────────────────────────────────────────
      APP_NAME:                     Curio
      APP_VERSION:                  "1.0.0"
      DEBUG:                        "True"
      ENVIRONMENT:                  development
      # ── CORS ─────────────────────────────────────────────────────────────
      FRONTEND_ORIGINS:             '["http://localhost","http://localhost:80","http://127.0.0.1","http://127.0.0.1:8000","null"]'
      # ── SMTP (replace with real values for OTP emails to work) ───────────
      SMTP_HOST:                    smtp.gmail.com
      SMTP_PORT:                    "587"
      SMTP_USER:                    your@gmail.com
      SMTP_PASS:                    your_app_password_here
      EMAILS_FROM_NAME:             Curio
      # ── Python path: makes backend.app.* resolve from /app ───────────────
      PYTHONPATH:                   /app
    ports:
      - "8000:8000"
    volumes:
      # Mount project root as /app so backend.app.* imports work inside container
      - .:/app
      # Persist uploaded avatars across container restarts
      - static_data:/app/static/avatars
    working_dir: /app
    command: >
      sh -c "
        echo '>>> Waiting for DB...' &&
        sleep 2 &&
        echo '>>> Running Alembic migrations...' &&
        alembic -c /app/alembic.ini upgrade head &&
        echo '>>> Seeding demo data...' &&
        python -m backend.app.seed || echo 'Seed skipped (already seeded)' &&
        echo '>>> Starting uvicorn...' &&
        uvicorn backend.app.main:app
          --host 0.0.0.0
          --port 8000
          --reload
          --reload-dir /app/backend
          --log-level info
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Nginx ─────────────────────────────────────────────────────────────────
  # Serves frontend static files + proxies /api/* to backend
  nginx:
    image: nginx:1.25-alpine
    container_name: curio_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./static:/usr/share/nginx/static:ro
      - ./nginx/cloudquiz.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    name: curio_postgres_data
  static_data:
    name: curio_static_data
