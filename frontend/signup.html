<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curio Cloud Quiz - Sign Up</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .error-msg {
        color: var(--danger);
        font-size: 13px;
        margin-top: 6px;
        display: none;
      }
      .error-msg.show {
        display: block;
      }
      .success-msg {
        background: #e6fff1;
        border: 1px solid #2ed573;
        color: #1a9c4c;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
        align-items: center;
        gap: 8px;
      }
      .success-msg.show {
        display: flex;
      }
      .auth-form .btn-primary {
        width: 100%;
        padding: 14px;
        font-size: 15px;
        margin-top: 16px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-left">
        <h1>Curio Cloud Quiz</h1>
        <p>
          Unlock the power of interactive learning and assessment. Create, take,
          and evaluate quizzes seamlessly.
        </p>
      </div>
      <div class="auth-right">
        <h2>Create Account</h2>
        <p class="subtitle">Join us to start learning today</p>

        <div class="success-msg" id="success-box">
          <i class="ri-checkbox-circle-line"></i>
          <span id="success-text">Account created!</span>
        </div>

        <div class="auth-form">
          <div class="input-group">
            <label for="su-name">Full Name</label>
            <div class="input-with-icon">
              <i class="ri-user-line"></i>
              <input
                type="text"
                id="su-name"
                autocomplete="name"
                placeholder="Your full name"
                required
              />
            </div>
          </div>
          <div class="input-group">
            <label for="su-email">Email Address</label>
            <div class="input-with-icon">
              <i class="ri-mail-line"></i>
              <input
                type="email"
                id="su-email"
                autocomplete="username"
                placeholder="you@example.com"
                required
              />
            </div>
          </div>
          <div class="input-group">
            <label for="su-pass"
              >Password
              <span style="color: var(--text-light); font-weight: 400"
                >(min 8 chars)</span
              ></label
            >
            <div class="input-with-icon">
              <i class="ri-lock-2-line"></i>
              <input
                type="password"
                id="su-pass"
                autocomplete="new-password"
                placeholder="••••••••"
                required
              />
            </div>
          </div>

          <p id="signup-error" class="error-msg"></p>

          <button type="button" id="signup-btn" class="btn btn-primary">
            Sign Up
          </button>

          <div class="auth-footer">
            Already have an account? <a href="index.html">Log In</a>
          </div>
        </div>
      </div>
    </div>

    <script src="api.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        Auth.redirectIfLoggedIn();

        const signupBtn = document.getElementById("signup-btn");
        const errorEl = document.getElementById("signup-error");
        const successEl = document.getElementById("success-box");
        const successTx = document.getElementById("success-text");

        function showErr(msg) {
          errorEl.textContent = msg;
          errorEl.classList.add("show");
          successEl.classList.remove("show");
        }
        function showOk(msg) {
          successTx.textContent = msg;
          successEl.classList.add("show");
          errorEl.classList.remove("show");
        }
        function hideAll() {
          errorEl.classList.remove("show");
          successEl.classList.remove("show");
        }

        async function doSignup() {
          hideAll();
          const name = document.getElementById("su-name").value.trim();
          const email = document.getElementById("su-email").value.trim();
          const pass = document.getElementById("su-pass").value;

          if (!name) {
            showErr("Please enter your full name.");
            return;
          }
          if (!email) {
            showErr("Please enter your email.");
            return;
          }
          if (pass.length < 8) {
            showErr("Password must be at least 8 characters.");
            return;
          }

          UI.setLoading(signupBtn, true);
          try {
            await AuthAPI.signup(name, email, pass);
            window.location.href = "dashboard.html";
          } catch (e) {
            showErr(e.message || "Sign up failed. Please try again.");
          } finally {
            UI.setLoading(signupBtn, false);
          }
        }

        signupBtn.addEventListener("click", doSignup);
        document.getElementById("su-pass").addEventListener("keydown", (e) => {
          if (e.key === "Enter") doSignup();
        });
      });
    </script>
  </body>
</html>
