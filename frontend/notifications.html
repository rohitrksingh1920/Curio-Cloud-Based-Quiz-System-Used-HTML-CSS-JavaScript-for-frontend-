<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curio - Notifications</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .page-header {
        margin-bottom: 32px;
      }
      .page-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .page-header-row h1 {
        font-size: 24px;
        font-weight: 700;
      }
      .filter-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }
      .filter-tab {
        padding: 8px 20px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        background: #fff;
        font-weight: 500;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-tab.active {
        background: var(--primary-color);
        color: #fff;
        border-color: var(--primary-color);
      }
      .filter-tab:hover:not(.active) {
        background: #f1f2f6;
      }
      .mark-all-btn {
        font-size: 14px;
        font-weight: 500;
        color: var(--primary-color);
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 8px;
      }
      .mark-all-btn:hover {
        background: #eef2ff;
      }
      .notif-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .notif-card {
        background: #fff;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 20px 24px;
        display: flex;
        align-items: flex-start;
        gap: 16px;
        position: relative;
        transition: box-shadow 0.2s;
      }
      .notif-card.unread {
        border-left: 4px solid var(--primary-color);
      }
      .notif-card:hover {
        box-shadow: var(--shadow-md);
      }
      .notif-icon-wrap {
        width: 44px;
        height: 44px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }
      .notif-icon-wrap.quiz_assigned {
        background: #eef2ff;
        color: var(--primary-color);
      }
      .notif-icon-wrap.system {
        background: #fff3e0;
        color: #ffa502;
      }
      .notif-icon-wrap.achievement {
        background: #e6fff1;
        color: #2ed573;
      }
      .notif-icon-wrap.performance {
        background: #fff0f0;
        color: #ff4757;
      }
      .notif-body {
        flex: 1;
      }
      .notif-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .notif-msg {
        font-size: 13px;
        color: var(--text-light);
        margin-bottom: 6px;
        line-height: 1.5;
      }
      .notif-time {
        font-size: 12px;
        color: var(--text-lighter);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .notif-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .unread-dot {
        width: 10px;
        height: 10px;
        background: var(--primary-color);
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 4px;
      }
      .read-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-light);
        font-size: 18px;
        padding: 4px;
        border-radius: 4px;
      }
      .read-btn:hover {
        color: var(--primary-color);
        background: #eef2ff;
      }
      .del-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-light);
        font-size: 18px;
        padding: 4px;
        border-radius: 4px;
      }
      .del-btn:hover {
        color: var(--danger);
        background: #fff0f0;
      }
      .empty-state {
        text-align: center;
        padding: 64px 24px;
        color: var(--text-light);
      }
      .empty-state i {
        font-size: 56px;
        margin-bottom: 12px;
        display: block;
      }
      .skeleton {
        background: linear-gradient(
          90deg,
          #f0f0f0 25%,
          #e0e0e0 50%,
          #f0f0f0 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <i
              class="ri-cloud-line"
              style="color: var(--primary-color); font-size: 24px"
            ></i>
            Curio
          </div>
        </div>
        <nav class="sidebar-menu">
          <a href="dashboard.html" class="menu-item"
            ><i class="ri-dashboard-line"></i> Dashboard</a
          >
          <a href="create-quiz.html" class="menu-item"
            ><i class="ri-add-circle-line"></i> Create Quiz</a
          >
          <a href="my-quizzes.html" class="menu-item"
            ><i class="ri-list-check-2"></i> My Quizzes</a
          >
          <a href="analytics.html" class="menu-item"
            ><i class="ri-bar-chart-box-line"></i> Analytics</a
          >
          <a href="settings.html" class="menu-item"
            ><i class="ri-settings-3-line"></i> Settings</a
          >
        </nav>
        <div class="sidebar-footer">
          <div class="user-avatar text-white">PJ</div>
          <div class="user-info">
            <div class="user-name">Welcome, Piyush!</div>
            <div class="user-role">
              <i class="ri-logout-box-r-line"></i
              ><a href="index.html">Logout</a>
            </div>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-header">
          <div class="search-bar">
            <i class="ri-search-line"></i
            ><input
              type="text"
              placeholder="Search quizzes, subjects, or students..."
            />
          </div>
          <div class="header-actions">
            <button class="notification-btn">
              <i class="ri-notification-3-line"></i><span class="badge">0</span>
            </button>
            <a
              href="create-quiz.html"
              class="btn btn-primary d-flex align-center gap-2"
              ><i class="ri-add-line"></i> Create New Quiz</a
            >
          </div>
        </header>

        <div class="main-scroll-area">
          <div class="page-header">
            <div class="page-header-row">
              <h1>Notifications</h1>
              <button class="mark-all-btn" id="mark-all-btn">
                <i class="ri-check-double-line"></i> Mark all read
              </button>
            </div>
            <p>Stay updated with your latest quiz activities and alerts.</p>
          </div>

          <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="unread">Unread</button>
          </div>

          <div class="notif-list" id="notif-list">
            <div class="skeleton" style="height: 80px"></div>
            <div class="skeleton" style="height: 80px"></div>
            <div class="skeleton" style="height: 80px"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="api.js"></script>
    <script>
      const TYPE_ICONS = {
        quiz_assigned: { icon: "ri-book-2-line", cls: "quiz_assigned" },
        system: { icon: "ri-information-line", cls: "system" },
        achievement: { icon: "ri-star-line", cls: "achievement" },
        performance: { icon: "ri-bar-chart-line", cls: "performance" },
      };

      function timeAgo(dateStr) {
        const diff = Date.now() - new Date(dateStr).getTime();
        const mins = Math.floor(diff / 60000);
        const hours = Math.floor(mins / 60);
        const days = Math.floor(hours / 24);
        if (mins < 1) return "Just now";
        if (mins < 60) return `${mins} minute${mins > 1 ? "s" : ""} ago`;
        if (hours < 24) return `${hours} hour${hours > 1 ? "s" : ""} ago`;
        if (days === 1) return "Yesterday";
        return `${days} days ago`;
      }

      let currentFilter = "all";

      document.addEventListener("DOMContentLoaded", async () => {
        if (!initProtectedPage()) return;

        // Filter tabs
        document.querySelectorAll(".filter-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            document
              .querySelectorAll(".filter-tab")
              .forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");
            currentFilter = tab.dataset.filter;
            loadNotifications();
          });
        });

        // Mark all read
        document
          .getElementById("mark-all-btn")
          .addEventListener("click", async () => {
            try {
              await NotificationsAPI.markAllRead();
              UI.toast("All notifications marked as read.");
              loadNotifications();
              UI.updateNotifBadge();
            } catch (e) {
              UI.toast(e.message, "error");
            }
          });

        loadNotifications();
      });

      async function loadNotifications() {
        const list = document.getElementById("notif-list");
        list.innerHTML = `<div class="skeleton" style="height:80px;"></div><div class="skeleton" style="height:80px;"></div>`;

        try {
          const data = await NotificationsAPI.list(currentFilter === "unread");
          const notifications = data.notifications;

          if (notifications.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <i class="ri-notification-off-line"></i>
                    <p>${currentFilter === "unread" ? "No unread notifications." : "No notifications yet."}</p>
                </div>`;
            return;
          }

          list.innerHTML = notifications.map((n) => buildCard(n)).join("");
          attachListeners();
        } catch (e) {
          list.innerHTML = `<p style="color:var(--danger);">Failed to load notifications: ${e.message}</p>`;
        }
      }

      function buildCard(n) {
        const t = TYPE_ICONS[n.type] || TYPE_ICONS.system;
        return `
    <div class="notif-card ${n.is_read ? "" : "unread"}" data-id="${n.id}">
        <div class="notif-icon-wrap ${t.cls}"><i class="${t.icon}"></i></div>
        <div class="notif-body">
            <div class="notif-title">${n.title}</div>
            <div class="notif-msg">${n.message}</div>
            <div class="notif-time"><i class="ri-time-line"></i>${timeAgo(n.created_at)}</div>
        </div>
        <div class="notif-actions">
            ${!n.is_read ? `<button class="read-btn" data-action="read" data-id="${n.id}" title="Mark as read"><i class="ri-check-line"></i></button>` : ""}
            <button class="del-btn" data-action="delete" data-id="${n.id}" title="Delete"><i class="ri-delete-bin-line"></i></button>
            ${!n.is_read ? `<div class="unread-dot"></div>` : ""}
        </div>
    </div>`;
      }

      function attachListeners() {
        document.querySelectorAll('[data-action="read"]').forEach((btn) => {
          btn.addEventListener("click", async () => {
            try {
              await NotificationsAPI.markRead(btn.dataset.id);
              loadNotifications();
              UI.updateNotifBadge();
            } catch (e) {
              UI.toast(e.message, "error");
            }
          });
        });

        document.querySelectorAll('[data-action="delete"]').forEach((btn) => {
          btn.addEventListener("click", async () => {
            try {
              await NotificationsAPI.delete(btn.dataset.id);
              UI.toast("Notification deleted.");
              loadNotifications();
              UI.updateNotifBadge();
            } catch (e) {
              UI.toast(e.message, "error");
            }
          });
        });
      }
    </script>
  </body>
</html>
