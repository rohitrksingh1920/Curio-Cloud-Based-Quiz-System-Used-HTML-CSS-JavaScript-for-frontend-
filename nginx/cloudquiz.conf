upstream cloudquiz_backend {
    server backend:8000;
    keepalive 32;
}

gzip on;
gzip_types text/plain text/css application/json application/javascript;
gzip_min_length 1024;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    access_log /var/log/nginx/cloudquiz_access.log;
    error_log  /var/log/nginx/cloudquiz_error.log warn;

    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin" always;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass         http://cloudquiz_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 90s;
    }

    location /health {
        proxy_pass         http://cloudquiz_backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location ~ /\. { deny all; }
}
