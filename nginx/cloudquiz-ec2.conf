# /etc/nginx/sites-available/curio
#
# Nginx config for Curio Cloud Quiz on EC2.
# Replace YOUR_EC2_PUBLIC_IP with your actual EC2 public IPv4.
#
# To apply:
#   sudo nginx -t
#   sudo systemctl reload nginx

upstream curio_backend {
    server 127.0.0.1:8000;   # Gunicorn listening on localhost only
    keepalive 32;
}

gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
gzip_min_length 1024;
gzip_vary on;

server {
    listen 80;
    listen [::]:80;

    # Replace with your EC2 public IP or domain name
    # deploy.sh runs: sed -i "s/YOUR_EC2_PUBLIC_IP/<actual_ip>/g" on this file
    server_name YOUR_EC2_PUBLIC_IP _;

    access_log /var/log/nginx/cloudquiz_access.log;
    error_log  /var/log/nginx/cloudquiz_error.log warn;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin" always;

    # Allow avatar uploads (max 5 MB, plus overhead)
    client_max_body_size 10M;

    # ── API → Gunicorn ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://curio_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout    90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    90s;
    }

    # ── Health check ────────────────────────────────────────
    location /health {
        proxy_pass        http://curio_backend/health;
        proxy_http_version 1.1;
        proxy_set_header  Host $host;
        access_log off;
    }

    # ── Swagger docs (proxied so /docs works) ───────────────
    location /docs {
        proxy_pass        http://curio_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header  Host $host;
    }
    location /openapi.json {
        proxy_pass        http://curio_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header  Host $host;
    }

    # ── Static files: uploaded avatars ──────────────────────
    # Served directly by Nginx for performance
    location /static/ {
        alias /home/ubuntu/curio/static/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Frontend HTML/JS/CSS ─────────────────────────────────
    root /home/ubuntu/curio/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache for static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
