upstream cloudquiz_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

gzip on;
gzip_types text/plain text/css application/json application/javascript;
gzip_min_length 1024;
gzip_vary on;

server {
    listen 80;
    listen [::]:80;

    # !! Replace YOUR_EC2_PUBLIC_IP with your actual EC2 public IP or domain
    server_name YOUR_EC2_PUBLIC_IP _;

    access_log /var/log/nginx/cloudquiz_access.log;
    error_log  /var/log/nginx/cloudquiz_error.log warn;

    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin" always;

    client_max_body_size 10M;

    # API → Gunicorn
    location /api/ {
        proxy_pass         http://cloudquiz_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }

    # Health check
    location /health {
        proxy_pass         http://cloudquiz_backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    # Frontend static files — served directly by Nginx
    root /home/ubuntu/cloud_quiz/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location ~ /\. { deny all; }
}
