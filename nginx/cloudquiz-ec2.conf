

# ── Rate limiting zones ─────────────────────────────────────────────────────
# Applies globally (must be in http block or here as nginx merges them)
limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=login_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

# ── Upstream: Gunicorn on localhost:8000 ────────────────────────────────────
upstream curio_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── Compression ─────────────────────────────────────────────────────────────
gzip            on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_vary       on;
gzip_proxied    any;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    text/xml
    application/xml
    image/svg+xml;

server {
    listen 80;
    listen [::]:80;

    # Replace with your EC2 public IP or domain name.
    # deploy.sh runs: sed -i "s/YOUR_EC2_PUBLIC_IP/<ip>/g" on this file automatically.
    server_name YOUR_EC2_PUBLIC_IP _;

    access_log  /var/log/nginx/cloudquiz_access.log combined;
    error_log   /var/log/nginx/cloudquiz_error.log  warn;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                 always;
    add_header X-XSS-Protection         "1; mode=block"              always;
    add_header X-Content-Type-Options   "nosniff"                    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=()" always;
    # Uncomment after enabling HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Max upload size (avatar images, quiz files) ────────────────────────
    client_max_body_size 10M;

    # ── Connection limits ──────────────────────────────────────────────────
    limit_conn conn_limit 20;

    # ── API proxy → Gunicorn ───────────────────────────────────────────────
    location /api/ {
        # Rate limit: 30 req/min general, burst of 10
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass             http://curio_backend;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Connection        "";
        proxy_read_timeout     90s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     90s;

        # Buffer settings for API responses
        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           8 8k;
    }

    # ── Login endpoint — stricter rate limit ──────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass           http://curio_backend;
        proxy_http_version   1.1;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_set_header     Connection        "";
        proxy_read_timeout   30s;
        proxy_connect_timeout 5s;
    }

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        proxy_pass          http://curio_backend/health;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_read_timeout  5s;
        access_log          off;
    }

    # ── Swagger / ReDoc (only in DEBUG mode) ──────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass           http://curio_backend;
        proxy_http_version   1.1;
        proxy_set_header     Host $host;
        proxy_read_timeout   30s;
    }

    # ── Uploaded avatar images ────────────────────────────────────────────
    # Served directly by Nginx — much faster than going through Python
    location /static/ {
        alias   /home/ubuntu/curio/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;

        # Security: only allow image types from this path
        location ~* \.(jpg|jpeg|png|gif|svg|ico|webp)$ {
            expires 30d;
        }
        # Block anything else (no PHP, scripts etc.)
        location ~* \.(php|py|sh|exe)$ {
            deny all;
        }
    }

    # ── Frontend SPA (HTML/CSS/JS) ────────────────────────────────────────
    root  /home/ubuntu/curio/frontend;
    index index.html;

    location / {
        # Try file, then directory, then fall back to index.html (SPA routing)
        try_files $uri $uri/ /index.html;
    }

    # Long-cache static assets with content hashes in filenames
    location ~* \.(css|js|woff|woff2|ttf|eot|png|jpg|jpeg|gif|ico|svg)$ {
        expires     30d;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── Custom error pages ────────────────────────────────────────────────
    error_page 429 /429.html;
    location = /429.html {
        root /home/ubuntu/curio/frontend;
        internal;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /home/ubuntu/curio/frontend;
        internal;
    }

    # ── Block hidden/sensitive files ──────────────────────────────────────
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common attack paths
    location ~* (wp-admin|wp-login|xmlrpc|\.php$) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
